<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/styles.css">
    <title>Odoo</title>
  </head>
  <body>    
    <nav class="navbar navbar-expand-lg sticky-top border-bottom bg-primary py-0">
      <div class="container border-bottom border-opacity-25 py-4">
        <a class="navbar-brand fw-semibold mb-0" href="#home">
          <img src="assets/icons/odoo-white.svg" class="brand-logo" alt="Odoo" width="90" />
        </a>

        <button class="navbar-toggler d-lg-none border-0 px-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#offcanvasNavbar" aria-controls="offcanvasNavbar" aria-label="Toggle navigation">
          <i data-lucide="menu" class="text-white"></i>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
          <div class="mx-auto">
            <ul class="navbar-nav">
              <li class="nav-item"><a class="nav-link text-white" href="#home">Home</a></li>
              <li class="nav-item"><a class="nav-link text-white" href="#">Products</a></li>
              <li class="nav-item"><a class="nav-link text-white" href="#">Pages</a></li>
              <li class="nav-item"><a class="nav-link text-white" href="#">App</a></li>
              <li class="nav-item"><a class="nav-link text-white" href="#">Docs</a></li>
            </ul>
          </div>
          <div>
            <a class="btn btn-link text-white text-decoration-none" href="#signin">Sign in</a>
            <a class="btn btn-light text-dark" href="#buynow">
              <i data-lucide="shopping-bag" class="icon-md" aria-hidden="true"></i>
              Buy now
            </a>
          </div>
        </div>
      </div>
    </nav>

    <!-- Mobile Offcanvas -->
    <div class="offcanvas offcanvas-start bg-primary text-white d-lg-none" tabindex="-1" id="offcanvasNavbar" aria-labelledby="offcanvasNavbarLabel">
      <div class="offcanvas-header border-bottom border-white border-opacity-25 py-4">
        <h5 class="offcanvas-title fw-semibold" id="offcanvasNavbarLabel">
          <img src="assets/icons/odoo-white.svg" alt="Odoo" width="90" />
        </h5>
        <button type="button" class="btn-close btn-close-white shadow-none" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
      <div class="offcanvas-body">
        <ul class="navbar-nav mb-4">
          <li class="nav-item"><a class="nav-link text-white" href="#home">Home</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="#">Products</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="#">Pages</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="#">App</a></li>
          <li class="nav-item"><a class="nav-link text-white" href="#">Docs</a></li>
        </ul>
        <div class="d-grid gap-2">
          <a class="btn btn-outline-light" href="#signin">Sign in</a>
          <a class="btn btn-light text-dark" href="#buynow">
            <i data-lucide="shopping-bag" class="icon-md" aria-hidden="true"></i>
            Buy now
          </a>
        </div>
      </div>
    </div>

    <script src="node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
      lucide.createIcons();
    </script>
  </body>
</html>
